interface:
  display_name: "AlphaXiv"
  short_description: "Research papers, arXiv summaries, and related-work search."
  brand_color: "#1A6B7A"
  default_prompt: "Use $alphaxiv to find papers on test-time scaling for reasoning models."

dependencies:
  tools:
    - type: "mcp"
      value: "alphaxiv"
      description: "AlphaXiv MCP server for research search, paper reading, and repo inspection."
      transport: "streamable_http"
      url: "https://api.alphaxiv.org/mcp/v1"

policy:
  allow_implicit_invocation: true
