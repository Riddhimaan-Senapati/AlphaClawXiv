name: Release

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          registry-url: "https://registry.npmjs.org"

      - name: Validate release version
        shell: bash
        run: |
          PACKAGE_VERSION="$(node -p "require('./plugins/alphaclawxiv/package.json').version")"
          PLUGIN_VERSION="$(node -p "require('./plugins/alphaclawxiv/openclaw.plugin.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "package.json version ($PACKAGE_VERSION) does not match openclaw.plugin.json version ($PLUGIN_VERSION)"
            exit 1
          fi

          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Release tag ($GITHUB_REF_NAME) does not match package version ($PACKAGE_VERSION)"
            exit 1
          fi

          echo "PACKAGE_VERSION=$PACKAGE_VERSION" >> "$GITHUB_ENV"
          echo "SOURCE_COMMIT=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Validate runtime syntax
        run: node --check ./plugins/alphaclawxiv/dist/index.js

      - name: Verify npm package contents
        run: npm pack --dry-run
        working-directory: ./plugins/alphaclawxiv

      - name: Publish to npm
        run: npm publish ./plugins/alphaclawxiv --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to ClawHub
        shell: bash
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          CHANGELOG: ${{ github.event.release.body || github.event.release.name || github.event.release.tag_name }}
        run: |
          npx -y clawhub@latest login --token "$CLAWHUB_TOKEN" --no-browser
          npx -y clawhub@latest package publish ./plugins/alphaclawxiv \
            --family code-plugin \
            --version "$PACKAGE_VERSION" \
            --changelog "$CHANGELOG" \
            --source-repo "$GITHUB_REPOSITORY" \
            --source-commit "$SOURCE_COMMIT" \
            --source-ref "$GITHUB_REF_NAME" \
            --source-path plugins/alphaclawxiv
